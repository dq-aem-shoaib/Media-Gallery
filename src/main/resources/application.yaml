server:
  port: 8080

spring:
  application:
    name: Media-Gallery

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/gallery
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: update


